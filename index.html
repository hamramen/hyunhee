<!DOCTYPE html>
<html>
  <head>
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="styles/10-rps.css">
  </head>
  <body>
    <div style="display:flex; justify-content: center;">
      <div style="text-align:center;">
        <p class="title">Rock Paper Scissors</p>
        <button onclick="
          playGame('rock');
        " class="move-button">
          <img src="images/rock.png" class="move-icon">
        </button>

        <button onclick="
          playGame('paper');
        " class="move-button">
          <img src="images/paper.png" class="move-icon">
        </button>

        <button onclick="
          playGame('scissors');
        " class="move-button">
        <img src="images/scissors.png" class="move-icon">
        </button>

        <p class="js-result result"></p>
        <div style="justify-content:space-around; display:flex;" class="js-moves"></div>
        <p class="js-score score"></p>

        <button onclick="
          score.wins = 0;
          score.losses = 0;
          score.ties = 0;
          localStorage.removeItem('score');
          updateScoreElement(); //remember
          document.querySelector('.js-result').innerHTML = null;
          document.querySelector('.js-moves').innerHTML = null;
        " class="reset-score-button">Reset Score</button>
      </div>
    </div>
    <script src="scripts/10-rps.js"></script>
  </body>
</html>
